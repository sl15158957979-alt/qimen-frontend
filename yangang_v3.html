function calcGJ(pan){
  const{palaces,fuPal,zhiPal,zhiMen,selfPal,dp,isY}=pan;const res=[];const fP=palaces[fuPal];
  const tp={};for(let i=1;i<=9;i++)tp[i]=palaces[i].gan;

  const KE={木:"土",土:"水",水:"火",火:"金",金:"木"};

    if(t==="丙"&&d==="戊")res.push({n:"飞鸟跌穴",t:"ji",d:`${GUA[p]}宫丙加戊，百事吉。`});
    if(SQ.includes(t)&&p===zhiPal)res.push({n:"三奇得使",t:"ji",d:`${t}奇临值使${zhiMen}门${GUA[p]}宫。`});
    if(t==="乙"&&p===3)res.push({n:"日出扶桑",t:"ji",d:`乙奇临震宫，贵人升殿。`});
    if(t==="丙"&&p===9)res.push({n:"月照端门",t:"ji",d:`丙奇临离宫，贵人高升。`});
    if(t==="丁"&&p===7)res.push({n:"星华天衢",t:"ji",d:`丁奇临兑宫，百事可为。`});
    if((t==="乙"&&d==="庚")||(t==="庚"&&d==="乙"))res.push({n:"奇仪相合",t:"ji",d:`${GUA[p]}宫乙庚合。`});
    if((t==="丙"&&d==="辛")||(t==="辛"&&d==="丙"))res.push({n:"奇仪相合",t:"ji",d:`${GUA[p]}宫丙辛合。`});
    if((t==="丁"&&d==="壬")||(t==="壬"&&d==="丁"))res.push({n:"奇仪相合",t:"ji",d:`${GUA[p]}宫丁壬合。`});
    if(mn&&SH[gw]===mw&&mj)res.push({n:"门宫和",t:"ji",d:`${GUA[p]}宫生${mn}门，吉。`});
    if(mn&&SH[mw]===gw&&mj)res.push({n:"门宫义",t:"ji",d:`${mn}门生${GUA[p]}宫，吉。`});
    if(t==="乙"&&d==="辛")res.push({n:"青龙逃走",t:"xio",d:`${GUA[p]}宫乙加辛，主凶。`});
    if(t==="辛"&&d==="乙")res.push({n:"白虎猖狂",t:"xio",d:`${GUA[p]}宫辛加乙，主凶。`});
    if(t==="丁"&&d==="癸")res.push({n:"朱雀投江",t:"xio",d:`${GUA[p]}宫丁加癸，口舌。`});
    if(t==="癸"&&d==="丁")res.push({n:"螣蛇天矫",t:"xio",d:`${GUA[p]}宫癸加丁，不利。`});
    if(t==="丙"&&d==="庚")res.push({n:"荧入太白",t:"xio",d:`${GUA[p]}宫丙加庚，防破财。`});
    if(t==="庚"&&d==="丙")res.push({n:"太白入荧",t:"xio",d:`${GUA[p]}宫庚加丙，万事不利。`});
    if(t==="庚"&&d==="癸")res.push({n:"大格",t:"xio",d:`${GUA[p]}宫庚加癸，凶。`});
    if(t==="庚"&&d==="壬")res.push({n:"上格",t:"xio",d:`${GUA[p]}宫庚加壬，破财。`});
    if(t==="庚"&&d==="己")res.push({n:"刑格",t:"xio",d:`${GUA[p]}宫庚加己，官司。`});
    if(t==="庚"&&d==="戊")res.push({n:"伏宫格",t:"xio",d:`${GUA[p]}宫庚加戊，大凶。`});
    if(t==="戊"&&d==="庚")res.push({n:"飞宫格",t:"xio",d:`${GUA[p]}宫戊加庚，大凶。`});
    if(t==="乙"&&p===2)res.push({n:"三奇入墓",t:"xio",d:`乙入坤，木墓未。`});
    if(t==="丙"&&p===6)res.push({n:"三奇入墓",t:"xio",d:`丙入乾，火墓戌。`});
    if(t==="丁"&&p===8)res.push({n:"三奇入墓",t:"xio",d:`丁入艮，火墓丑。`});
    if(mn&&KE[mw]===gw)res.push({n:"门迫",t:"xio",d:`${mn}门克${GUA[p]}宫。`});

  }
  if(["开","休","生"].includes(fP.men)&&fP.shenJi)res.push({n:"值符三吉",t:"ji",d:`值符${GUA[fuPal]}宫${fP.men}门+${fP.shen}。`});

  if(DC[fuPal]===zhiPal)res.push({n:"反吟局",t:"xio",d:`值符值使对冲，反复动荡。`});
  const kp=[pan.kongPal1,pan.kongPal2];
  if(kp.includes(fuPal))res.push({n:"值符空亡",t:"xio",d:`值符${GUA[fuPal]}宫空亡。`});

  if(!res.length)res.push({n:"普通局",t:"zh",d:"无特殊格局。"});
  return res;
}

function calcYS(pan,mt){const w=MWt[mt]||MWt.general;return Object.values(pan.palaces).filter(p=>p.pal!==5).map(p=>{let s=0;s+=w.men[p.men]||0;s+=w.xing[p.xing]||0;s+=w.shen[p.shen]||0;if(SQ.includes(p.gan))s+=2;if(p.isFu)s+=2;if(pan.gender&&p.isGF&&["生","开","休"].includes(p.men))s+=1;if(mt==="marriage"){if(pan.gender==="male"&&p.shen==="六合")s+=3;if(pan.gender==="female"&&p.shen==="太阴")s+=3;}if(pan.selfPal&&p.pal===pan.selfPal){if(["生","开","休"].includes(p.men)&&p.shenJi)s+=3;else if(["死","惊","伤"].includes(p.men)&&!p.shenJi)s-=3;}return{pal:p.pal,score:s,p};}).sort((a,b)=>b.score-a.score);}

<div><b>定局</b>：${p.jieStr}(ji=${p.ji})${p.yuanStr}(y=${p.yuan})→${p.isY?"阳":"阴"}遁${p.ju}局</div>
<div><b>日</b>：${GAN10[p.dg]}${ZHI12[p.dz]} <b>时</b>：${GAN10[p.hg]}${ZHI12[p.hz]} <b>旬首仪</b>：${p.xunYi} <b>旬首宫</b>：${GUA[p._xunPal]}${p._xunPal} <b>时干宫</b>：${GUA[p._shiPal]}${p._shiPal}</div>
<div><b>天盘shift</b>=${p._shiftTP} <b>门step</b>=${p._menStep} <b>门shift</b>=${p._shiftMEN} <b>门目标</b>=${GUA[p._menTarget]}${p._menTarget}</div>
<div><b>值符</b>：${GUA[p.fuPal]}${p.fuPal}宫 <b>值使</b>：${GUA[p.zhiPal]}${p.zhiPal}宫${p.zhiMen}门</div>
<div style="margin-top:4px"><b>地盘</b>：</div><div class="dp-row">${[4,9,2,3,5,7,8,1,6].map(i=>`<span class="dp-cell">${GUA[i]}${i}:${p.dp[i]}</span>`).join("")}</div>
<div><b>天盘</b>：</div><div class="dp-row">${[4,9,2,3,5,7,8,1,6].map(i=>`<span class="dp-cell">${GUA[i]}${i}:${p.palaces[i].gan}</span>`).join("")}</div>
<div><b>九星</b>：</div><div class="dp-row">${[4,9,2,3,5,7,8,1,6].map(i=>`<span class="dp-cell">${GUA[i]}${i}:${p.palaces[i].xing}</span>`).join("")}</div>
<div><b>八门</b>：</div><div class="dp-row">${[4,9,2,3,5,7,8,1,6].map(i=>`<span class="dp-cell">${GUA[i]}${i}:${p.palaces[i].men||"—"}</span>`).join("")}</div>
<div><b>八神</b>：</div><div class="dp-row">${[4,9,2,3,5,7,8,1,6].map(i=>`<span class="dp-cell">${GUA[i]}${i}:${p.palaces[i].shen||"—"}</span>`).join("")}</div>
</div></details>
${ld?'<div class="card" style="text-align:center;padding:24px"><div class="loading-spin"></div></div>':""}
${v?`<div class="verdict-card"><div style="font-size:11px;color:#aaa;margin-bottom:4px">你的问题</div><div style="font-size:13px;color:#555;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid #f0ede8;line-height:1.6">${S.question}</div><div style="display:flex;align-items:center;gap:10px;margin-bottom:12px"><div class="verdict-icon" style="background:${v.verdict==="吉"?"#E1F5EE":v.verdict==="凶"?"#FCEBEB":"#FEF9E7"}">${v.verdict==="吉"?"✦":v.verdict==="凶"?"✕":"◈"}</div><div style="font-size:17px;font-weight:700;color:${v.verdict==="吉"?"#0F6E56":v.verdict==="凶"?"#A32D2D":"#854F0B"}">${v.title}</div></div><div class="verdict-summary">${v.summary}</div><div style="margin-bottom:14px">${(v.points||[]).map(pt=>`<div class="verdict-point" style="background:${pt.type==="ji"?"#E1F5EE":pt.type==="xiong"?"#FCEBEB":"#FEF9E7"}">${pt.text}</div>`).join("")}</div><div class="advice-box"><div style="font-size:11px;color:#888;margin-bottom:4px">建议</div><div style="font-size:13px;color:#eee;line-height:1.8">${v.advice}</div></div></div>`:""
}
<div class="main-layout"><div>
<div class="palace-grid">${DISP.map(({p:i,l})=>{const pl=p.palaces[i],ic=i===5,qi=SQ.includes(pl.gan);const cls=["palace",ic?"center":"",sp===i?"selected":"",t2.includes(i)&&!ic?"top2":"",pl.isSelf?"self-pal":""].filter(Boolean).join(" ");return`<div class="${cls}" data-p="${i}"><div class="pal-dir">${DIR[i]}</div><div class="pal-lbl">${l}</div>${pl.shen&&!ic?`<div class="pal-shen" style="color:${pl.shenJi?"#854F0B":"#B02020"}">${pl.shen}</div>`:""} ${pl.men&&!ic?`<div class="pal-men" style="color:${pl.menJi?"#185FA5":"#B02020"}">${pl.men}门</div>`:""}<div style="display:flex;align-items:baseline"><span class="pal-gan" style="color:${qi?"#534AB7":"#111"}">${ic?"":pl.gan}</span>${!ic?`<span style="font-size:10px;color:#aaa;margin-left:2px">/${pl.diGan}</span>`:""} ${pl.xing&&!ic?`<span class="pal-xing">${pl.xing}</span>`:""} ${!ic&&p.wangXiang?`<span style="font-size:8px;color:${p.wangXiang[i]==='旺'?'#1D9E75':p.wangXiang[i]==='相'?'#185FA5':p.wangXiang[i]==='死'?'#A32D2D':'#aaa'};margin-left:2px">${p.wangXiang[i]}</span>`:""}</div><div class="pal-tags">${pl.isFu?'<span class="tag tag-fu">值符</span>':""}${pl.isShi?'<span class="tag tag-shi">值使</span>':""}${pl.isSelf?'<span class="tag tag-self">自身</span>':""}${t2.includes(i)&&!pl.isSelf&&!ic?'<span class="tag tag-rec">荐</span>':""}${[p.kongPal1,p.kongPal2].includes(i)?'<span class="tag" style="background:#f5f5f5;color:#aaa">空</span>':""}${ic?`<span style="font-size:9px;color:#aaa">${pl.gan}</span>`:""}</div></div>`;}).join("")}</div>
${sP?`<div class="card"><div style="font-size:12px;font-weight:600;margin-bottom:8px">${GUA[sp]}宫(${DIR[sp]})${sR===0?" ★首推":sR===1?" 次推":""}${sP.isSelf?" 自身":""}</div><div class="detail-grid">${[["天盘",sP.gan+(SQ.includes(sP.gan)?" 三奇":"")],["地盘",sP.diGan],["八门",(sP.men||"—")+(sP.menJi?" 吉":" 凶")],["九星",sP.xing||"—"],["八神",(sP.shen||"—")+(sP.shenJi?" 吉":" 凶")],["排名",sR>=0?"第"+(sR+1):"—"]].map(([k,v])=>`<div class="detail-item"><div class="dk">${k}</div><div class="dv">${v}</div></div>`).join("")}</div>${sP.men?`<div class="sect"><b>${sP.men}门</b> ${MEN_D[sP.men]||""}</div>`:""} ${sP.xing&&sp!==5?`<div class="sect"><b>${sP.xing}</b> ${XING_D[sP.xing]||""}</div>`:""} ${sP.shen?`<div class="sect"><b>${sP.shen}</b> ${SHEN_D[sP.shen]||""}</div>`:""} ${p.wangXiang&&sp!==5?`<div class="sect"><b>旺相</b> ${p.wangXiang[sp]}</div>`:""} ${[p.kongPal1,p.kongPal2].includes(sp)?'<div class="sect" style="color:#A32D2D"><b>⚠空亡</b></div>':""}</div>`:""}</div>
<div class="right-panel">
<div class="panel"><div class="panel-title">格局识别</div>${gj.map(g=>`<div class="geju-item geju-${g.t}"><div class="geju-name">${g.n}</div><div class="geju-desc">${g.d}</div></div>`).join("")}</div>
<div class="panel"><div class="panel-title">用神推荐</div>${ys.slice(0,4).map((s,r)=>{const mx=Math.max(ys[0]?.score||1,1),f=Math.round((Math.max(s.score,0)/mx)*5);return`<div class="ys-item" data-y="${s.pal}" style="background:${r===0?"#E1F5EE":s.p.isSelf?"#FEF9E7":"#f8f7f4"}"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px"><span style="font-size:11px;font-weight:600">${GUA[s.pal]}(${DIR[s.pal]})${r===0?"★":""}${s.p.isSelf?" 自":""}</span><div class="ys-dots">${Array.from({length:5}).map((_,j)=>`<div class="ys-dot${j<f?" fill":""}"></div>`).join("")}</div></div><div style="font-size:10px;color:#666">${s.p.men}门·${s.p.xing}·${s.p.shen}</div></div>`;}).join("")}</div>
<div class="panel"><div class="panel-title">本局信息</div><div style="font-size:11px;color:#555;line-height:2"><div>${p.jieStr}${p.yuanStr}·${p.isY?"阳":"阴"}遁${p.ju}局</div><div>值符：${GUA[p.fuPal]}宫${p.palaces[p.fuPal]?.xing}</div><div>值使：${GUA[p.zhiPal]}宫${p.zhiMen}门</div><div>月令：<b>${p.yueWx}</b></div><div style="color:#A32D2D">空亡：${p.kongZhi.join("")}(${GUA[p.kongPal1]}·${GUA[p.kongPal2]})</div>${p.isWubuyu?'<div style="color:#A32D2D;font-weight:600">⚠五不遇时</div>':""}${city?`<div style="color:#185FA5">起卦：${city.name}</div>`:""}</div></div></div></div>`:""}
</div>`;
}

function renderAdmin(){const{adminTab:at,users:us,logs:ls,stats:st}=S;return`<div class="admin-wrap"><div style="display:flex;justify-content:space-between;margin-bottom:16px"><div style="font-size:17px;font-weight:700">${COMPANY}·后台</div><button class="btn-sm" id="bm">返回</button></div>${st?`<div class="grid5" style="margin-bottom:16px">${[["今日",st.today+"次"],["账号",st.active+"/"+st.users],["累计",st.total+"次"]].map(([l,v])=>`<div class="info-card"><div class="lbl">${l}</div><div class="val">${v}</div></div>`).join("")}</div>`:""}<div class="tab-bar"><button class="tab${at==="users"?" active":""}" data-t="users">员工</button><button class="tab${at==="logs"?" active":""}" data-t="logs">记录</button></div>${at==="users"?`<div class="card" style="margin-bottom:12px"><div style="display:flex;gap:8px"><input id="nu" placeholder="账号" value="${S.newUsername}" style="flex:1"/><input id="np" placeholder="密码" value="${S.newPassword}" style="flex:1"/><button class="btn-sm" id="bc" style="background:#1a1a1a;color:#fff">创建</button></div>${S.adminMsg?`<div style="font-size:12px;color:#0F6E56;margin-top:8px">${S.adminMsg}</div>`:""}</div><div class="card"><table><thead><tr><th>账号</th><th>状态</th><th>操作</th></tr></thead><tbody>${us.map(u=>`<tr><td>${u.username}</td><td><span class="badge ${u.enabled?"badge-on":"badge-off"}">${u.enabled?"启用":"停用"}</span></td><td>${u.role!=="admin"?`<button class="btn-sm" data-tg="${u.id}">${u.enabled?"停":"启"}</button> <button class="btn-sm" data-dl="${u.id}" data-dn="${u.username}" style="color:#A32D2D">删</button>`:""}</td></tr>`).join("")}</tbody></table></div>`:`<div class="card"><table><thead><tr><th>时间</th><th>员工</th><th>问题</th><th>结果</th></tr></thead><tbody>${ls.map(l=>`<tr><td style="color:#aaa;font-size:12px">${(l.created_at||"").slice(5,16)}</td><td>${l.username}</td><td style="font-size:12px">${l.question||""}</td><td><span class="badge badge-${l.verdict==="吉"?"ji":l.verdict==="凶"?"xio":"zh"}">${l.verdict||"—"}</span></td></tr>`).join("")}</tbody></table></div>`}</div>`;}

function bindEvents(){
  document.getElementById("bl")?.addEventListener("click",async()=>{const u=document.getElementById("lu").value.trim(),pw=document.getElementById("lp").value;if(!u||!pw){setState({error:"请填写"});return;}setState({loading:true,error:""});try{const r=await apiPost("/api/login",{username:u,password:pw});if(r.error){setState({loading:false,error:r.error});return;}localStorage.setItem("ygmt_s",JSON.stringify(r));setState({session:r,page:"main",loading:false,error:""});}catch(e){setState({loading:false,error:"网络错误"});}});
  document.getElementById("bo")?.addEventListener("click",()=>{localStorage.removeItem("ygmt_s");setState({session:null,page:"login",error:""});});
  document.getElementById("ba")?.addEventListener("click",async()=>{setState({page:"admin"});await loadAdmin();});
  document.getElementById("bm")?.addEventListener("click",()=>setState({page:"main"}));
  document.querySelectorAll(".zhi-btn").forEach(b=>b.onclick=()=>setState({ziIdx:+b.dataset.zi}));
  document.getElementById("dv")?.addEventListener("change",e=>setState({dateVal:e.target.value}));
  document.getElementById("bi")?.addEventListener("change",e=>setState({birth:e.target.value}));
  document.getElementById("cb")?.addEventListener("click",()=>setState({birth:""}));
  document.querySelectorAll(".gender-btn").forEach(b=>b.onclick=()=>setState({gender:b.dataset.g}));
  const ciEl=document.getElementById("ci");if(ciEl)ciEl.oninput=e=>{setState({cityInput:e.target.value,...(!e.target.value?{city:null}:{})});};
  document.querySelectorAll(".city-btn").forEach(b=>{b.onclick=()=>{const c=CITIES.find(x=>x.name===b.dataset.c);if(c)setState({city:c,cityInput:c.name});};});
  document.getElementById("cc")?.addEventListener("click",()=>setState({city:null,cityInput:""}));
  const qq=document.getElementById("qq");if(qq)qq.oninput=e=>S.question=e.target.value;
  document.getElementById("br")?.addEventListener("click",async()=>{
    if(!S.dateVal||!S.question.trim()){setState({error:"请填写日期和问题"});return;}
    setState({error:""});const mt=inferMatter(S.question);
    const p=calcPan(S.dateVal,S.ziIdx,S.birth||null,S.gender);
    const gr=calcGJ(p),yr=calcYS(p,mt);
    setState({pan:p,gj:gr,ys:yr,verdict:null,selPal:null,loading:true});
    try{
      const{selfPal,selfGan,fuPal,zhiPal,zhiMen,dp}=p;
      const gStr=S.gender==="male"?"男":S.gender==="female"?"女":"未填";
      const si=selfPal?`${gStr}，日干${selfGan}，自身${GUA[selfPal]}宫(${DIR[selfPal]}) ${p.palaces[selfPal].men}门·${p.palaces[selfPal].xing}·${p.palaces[selfPal].shen}`:`${gStr}`;
      const ps=Object.values(p.palaces).map(pl=>{if(pl.pal===5)return`中宫:天${pl.gan}/地${dp[5]}`;return`${GUA[pl.pal]}(${DIR[pl.pal]}):天${pl.gan}/地${dp[pl.pal]},${pl.men}门(${pl.menJi?"吉":"凶"}),${pl.xing}(${p.wangXiang[pl.pal]}),${pl.shen}(${pl.shenJi?"吉":"凶"})${pl.isFu?"[值符]":""}${pl.isShi?"[值使]":""}${pl.isSelf?"[自身]":""}${[p.kongPal1,p.kongPal2].includes(pl.pal)?"[空]":""}`;}).join("\n");
      const gs=gr.map(g=>`【${g.n}·${g.t==="ji"?"吉":g.t==="xio"?"凶":"平"}】${g.d}`).join("\n");
      const y3=yr.slice(0,3).map((s,i)=>`${i+1}.${GUA[s.pal]}宫 ${s.p.men}门·${s.p.xing}·${s.p.shen}`).join("\n");
      const prompt=`你是精通奇门遁甲的命理师（张志春《神奇之门》体系），用大白话解答，像朋友聊天。
【问题】${S.question}
【问事者】${si}${S.city?"\n起卦："+S.city.name:""}
【盘面】${p.isY?"阳":"阴"}遁${p.ju}局 ${p.jieStr}${p.yuanStr}
日${GAN10[p.dg]}${ZHI12[p.dz]} 时${GAN10[p.hg]}${ZHI12[p.hz]} 月令${p.yueWx}
空亡${p.kongZhi.join("")}(${GUA[p.kongPal1]}·${GUA[p.kongPal2]})${p.isWubuyu?" ⚠五不遇":""}
值符${GUA[p.fuPal]}宫${p.palaces[p.fuPal]?.xing} 值使${GUA[p.zhiPal]}宫${p.zhiMen}门
【各宫】\n${ps}
【格局】\n${gs}
【推荐】\n${y3}
按竖看(天地人神)→横看(日干时干落宫生克)→格局→空亡→主客→建议六步分析。
严格返回JSON：{"verdict":"吉/凶/中","title":"10字内","summary":"80字内","points":[{"type":"ji/xiong/info","text":"40字内"}],"advice":"100字内含方向时机"}`;
      const r=await apiPost("/api/duanyu",{prompt,question:S.question},S.session?.token);
      if(r.error)throw new Error(r.error);setState({verdict:r,loading:false});
    }catch(e){setState({loading:false,error:"断语失败："+e.message});}
  });
  document.querySelectorAll(".palace").forEach(e=>e.onclick=()=>{const pp=+e.dataset.p;setState({selPal:S.selPal===pp?null:pp});});
  document.querySelectorAll("[data-y]").forEach(e=>e.onclick=()=>setState({selPal:+e.dataset.y}));
  document.querySelectorAll(".tab").forEach(b=>b.onclick=()=>setState({adminTab:b.dataset.t}));
  document.getElementById("bc")?.addEventListener("click",async()=>{const u=document.getElementById("nu").value.trim(),pw=document.getElementById("np").value;if(!u||!pw)return;const r=await apiPost("/api/admin/users",{username:u,password:pw},S.session?.token);setState({adminMsg:r.error||r.message||"",newUsername:"",newPassword:""});if(!r.error)await loadAdmin();});
  document.getElementById("nu")?.addEventListener("input",e=>S.newUsername=e.target.value);
  document.getElementById("np")?.addEventListener("input",e=>S.newPassword=e.target.value);
  document.querySelectorAll("[data-tg]").forEach(b=>b.onclick=async()=>{await apiPatch(`/api/admin/users/${b.dataset.tg}/toggle`,{},S.session?.token);await loadAdmin();});
  document.querySelectorAll("[data-dl]").forEach(b=>b.onclick=async()=>{if(!confirm(`删除${b.dataset.dn}?`))return;await apiDel(`/api/admin/users/${b.dataset.dl}`,S.session?.token);await loadAdmin();});
  document.getElementById("lp")?.addEventListener("keydown",e=>{if(e.key==="Enter")document.getElementById("bl")?.click();});
}
async function loadAdmin(){const t=S.session?.token;const[u,l,s]=await Promise.all([apiGet("/api/admin/users",t),apiGet("/api/admin/logs?limit=30",t),apiGet("/api/admin/stats",t)]);setState({users:u||[],logs:l.logs||[],stats:s});}
render();
</script>
</body>
</html>
